---
layout: pnec-base
title: "Sign In"
description: "Sign in to your PNEC account."
body_class: auth-page-body
---

<div class="auth-page">
  <div class="auth-card">

    <div class="auth-logo">
      <img src="/assets/images/pnec-logo.png" alt="PNEC Logo" width="64" height="64"
           onerror="this.style.display='none'">
      <div class="auth-logo-title">PNEC</div>
      <div class="auth-logo-sub">Poway Neighborhood Emergency Corps</div>
    </div>

    <h2>Sign In</h2>

    <div id="login-error" class="alert alert-error" style="display:none" role="alert"></div>

    <form id="login-form" novalidate>
      <div class="form-group">
        <label class="form-label" for="login-email">Email Address</label>
        <input id="login-email" type="email" class="form-input"
               placeholder="you@example.com" autocomplete="email" required>
      </div>

      <div class="form-group">
        <label class="form-label" for="login-password">Password</label>
        <input id="login-password" type="password" class="form-input"
               placeholder="Enter your password" autocomplete="current-password" required>
      </div>

      <div class="form-group" style="display:flex;align-items:center;gap:8px">
        <input id="login-remember" type="checkbox" style="width:auto">
        <label for="login-remember" style="font-size:14px;color:#5a5a5a;margin:0">Remember me on this device</label>
      </div>

      <button id="login-submit-btn" type="submit" class="btn btn-primary btn-block">
        Sign In
      </button>
    </form>

    <div class="auth-footer-links">
      <a href="/pages/forgot-password.html">Forgot your password?</a>
    </div>

    <div class="auth-divider"><span>New to PNEC?</span></div>

    <div class="auth-footer-links">
      <a href="/pages/register.html" class="btn btn-outline btn-block">Create a Free Account</a>
    </div>

  </div>
</div>

<script src="/assets/js/pages/login-page.js"></script>
