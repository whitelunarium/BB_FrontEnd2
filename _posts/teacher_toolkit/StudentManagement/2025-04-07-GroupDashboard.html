<!-- 
  This page serves as a dynamic dashboard for individual groups.
  The group name is passed via URL query parameter: /student/groups/dashboard?group=group-name
-->

{% include group_dashboard.html %}

<script type="module">
  import { javaURI, fetchOptions } from '{{site.baseurl}}/assets/js/api/config.js';

  const MEMBER_ANALYTICS_PAGE_SIZE = 5;
  const MEMBER_ANALYTICS_COLUMN_COUNT = 8;
  let memberAnalyticsCurrentPage = 1;
  let activeDashboardGroup = null;
  const memberAnalyticsCache = new Map();
  const memberSummaryCache = new Map();

  function getDefaultMemberSummary() {
    return {
      totalTimeFormatted: '0m',
      totalLessonsViewed: 0,
      totalLessonsCompleted: 0,
      totalCodeExecutions: 0,
      interactionPercentage: 0,
      averageScrollDepth: 0
    };
  }

  // Extract group name from URL query parameter
  function getGroupNameFromURL() {
    const params = new URLSearchParams(window.location.search);
    const groupName = params.get('group');
    if (groupName) {
      return decodeURIComponent(groupName).replace(/-/g, ' ');
    }
    return null;
  }

  // Load group data based on name
  async function loadGroupDashboard() {
    const groupName = getGroupNameFromURL();
    
    if (!groupName) {
      // Redirect to groups list if no group specified
      window.location.href = '{{site.baseurl}}/student/groups';
      return;
    }

    // Update page title
    document.getElementById('dashboardGroupName').textContent = groupName;
    document.title = `${groupName} - Dashboard`;

    try {
      // Try to fetch group data from API
      const response = await fetch(`${javaURI}/api/groups/search?name=${encodeURIComponent(groupName)}`, fetchOptions);
      
      if (response.ok) {
        const groups = await response.json();
        const group = Array.isArray(groups) 
          ? groups.find(g => g.name.toLowerCase() === groupName.toLowerCase()) || groups[0]
          : groups;
        
        if (group && group.id) {
          console.log('Loading dashboard for group:', group.name, 'ID:', group.id);
          populateDashboard(group);
        } else {
          // Group not found - show placeholder data
          console.log('Group not found or missing ID:', group);
          document.getElementById('dashboardGroupMeta').textContent = 'Group data not available';
        }
      }
    } catch (error) {
      console.error('Failed to load group data:', error);
      // Show placeholder data on error
      document.getElementById('dashboardGroupMeta').textContent = 'Unable to load group data';
    }
  }

  // Fetch analytics data for a specific member in a specific group
  async function fetchMemberAnalytics(personId, groupId) {
    try {
      const response = await fetch(`${javaURI}/api/groups/chat/analytics/${personId}`, fetchOptions);
      
      if (!response.ok) {
        if (response.status === 404) {
          // Person has no analytics data yet
          return { messagesSent: 0, messagesWithImages: 0, sharedFilesCount: 0 };
        }
        throw new Error(`Failed to fetch analytics: ${response.status}`);
      }
      
      const analytics = await response.json();
      
      // Find the specific group's analytics from the groupAnalytics array
      const groupData = analytics.groupAnalytics?.find(g => g.groupId === groupId);
      
      if (groupData) {
        return {
          messagesSent: groupData.messagesSent || 0,
          messagesWithImages: groupData.messagesWithImages || 0,
          sharedFilesCount: groupData.sharedFilesCount || 0
        };
      }
      
      // Member is in group but has no activity yet
      console.log(`No activity found for person ${personId} in group ${groupId}`);
      return { messagesSent: 0, messagesWithImages: 0, sharedFilesCount: 0 };
      
    } catch (error) {
      console.warn(`Failed to fetch analytics for person ${personId}:`, error);
      return { messagesSent: 0, messagesWithImages: 0, sharedFilesCount: 0 };
    }
  }

  async function fetchMemberSummary(personId) {
    try {
      const response = await fetch(`${javaURI}/api/ocs-analytics/admin/user/${personId}/summary`, fetchOptions);

      if (!response.ok) {
        if ([401, 403, 404].includes(response.status)) {
          return getDefaultMemberSummary();
        }
        throw new Error(`Failed to fetch member summary: ${response.status}`);
      }

      const summary = await response.json();
      return {
        totalTimeFormatted: summary?.totalTimeFormatted || '0m',
        totalLessonsViewed: summary?.totalLessonsViewed || 0,
        totalLessonsCompleted: summary?.totalLessonsCompleted || 0,
        totalCodeExecutions: summary?.totalCodeExecutions || 0,
        interactionPercentage: summary?.interactionPercentage || 0,
        averageScrollDepth: summary?.averageScrollDepth || 0
      };
    } catch (error) {
      console.warn(`Failed to fetch OCS summary for person ${personId}:`, error);
      return getDefaultMemberSummary();
    }
  }

  function getMemberAnalyticsCacheKey(groupId, personId) {
    return `${groupId}:${personId}`;
  }

  function getMemberSummaryCacheKey(personId) {
    return `${personId}`;
  }

  function getMemberAnalyticsPageRange(totalMembers, page) {
    if (totalMembers === 0) {
      return { start: 0, end: 0 };
    }

    const start = (page - 1) * MEMBER_ANALYTICS_PAGE_SIZE + 1;
    const end = Math.min(page * MEMBER_ANALYTICS_PAGE_SIZE, totalMembers);
    return { start, end };
  }

  function updateMemberAnalyticsPagination(totalMembers, page) {
    const info = document.getElementById('memberAnalyticsPaginationInfo');
    const prevButton = document.getElementById('memberAnalyticsPrevButton');
    const nextButton = document.getElementById('memberAnalyticsNextButton');
    const totalPages = Math.max(1, Math.ceil(totalMembers / MEMBER_ANALYTICS_PAGE_SIZE));
    const { start, end } = getMemberAnalyticsPageRange(totalMembers, page);

    info.textContent = `Showing ${start}-${end} of ${totalMembers}`;
    prevButton.disabled = page <= 1 || totalMembers === 0;
    nextButton.disabled = page >= totalPages || totalMembers === 0;
  }

  function renderMemberAnalyticsRows(membersWithAnalytics) {
    const tbody = document.getElementById('memberAnalyticsBody');

    if (!membersWithAnalytics.length) {
      tbody.innerHTML = `<tr><td colspan="${MEMBER_ANALYTICS_COLUMN_COUNT}" class="py-8 text-center text-gray-400">No members in this group</td></tr>`;
      return;
    }

    tbody.innerHTML = membersWithAnalytics.map(({ member, analytics, summary }) => {
      const initials = getInitials(member.name || member.uid);
      const color = getRandomColor(member.id);

      return `
        <tr class="border-b border-neutral-700/50 hover:bg-neutral-700/30">
          <td class="py-3 pr-4 whitespace-nowrap">
            <div class="flex items-center gap-2">
              <div class="w-8 h-8 ${color} rounded-full flex items-center justify-center text-white text-xs font-medium">${initials}</div>
              <span>${member.name || member.uid}</span>
            </div>
          </td>
          <td class="py-3 pr-4 whitespace-nowrap">${analytics.messagesSent}</td>
          <td class="py-3 pr-4 whitespace-nowrap">${analytics.messagesWithImages}</td>
          <td class="py-3 pr-4 whitespace-nowrap">${summary.totalTimeFormatted}</td>
          <td class="py-3 pr-4 whitespace-nowrap">${summary.totalLessonsCompleted}</td>
          <td class="py-3 pr-4 whitespace-nowrap">${summary.totalCodeExecutions}</td>
          <td class="py-3 pr-4 whitespace-nowrap">${formatPercent(summary.interactionPercentage)}</td>
          <td class="py-3 whitespace-nowrap">${formatPercent(summary.averageScrollDepth)}</td>
        </tr>
      `;
    }).join('');
  }

  function formatPercent(value) {
    const numericValue = Number(value);
    if (!Number.isFinite(numericValue)) {
      return '0.0%';
    }
    return `${numericValue.toFixed(1)}%`;
  }

  async function loadDashboardSummaryStats(group) {
    const firstMember = group.members?.[0];
    const totalFilesEl = document.getElementById('statTotalFiles');
    const totalMessagesEl = document.getElementById('statTotalMessages');

    totalFilesEl.textContent = '0';
    totalMessagesEl.textContent = '0';

    const requests = [];

    if (firstMember) {
      requests.push(fetch(`${javaURI}/api/groups/chat/analytics/${firstMember.id}`, fetchOptions));
    } else {
      requests.push(Promise.resolve(null));
    }

    requests.push(fetch(`${javaURI}/api/groups/chat/${group.id}/messages`, fetchOptions));

    const [analyticsResponse, messagesResponse] = await Promise.all(requests);

    if (analyticsResponse?.ok) {
      const analytics = await analyticsResponse.json();
      const groupData = analytics.groupAnalytics?.find(g => g.groupId === group.id);
      totalFilesEl.textContent = groupData?.sharedFilesCount || 0;
    }

    if (messagesResponse.ok) {
      const messages = await messagesResponse.json();
      totalMessagesEl.textContent = Array.isArray(messages) ? messages.length : 0;
    }
  }

  async function loadMemberAnalyticsPage(page) {
    if (!activeDashboardGroup) return;

    const members = activeDashboardGroup.members || [];
    const totalMembers = members.length;
    const totalPages = Math.max(1, Math.ceil(totalMembers / MEMBER_ANALYTICS_PAGE_SIZE));
    const safePage = Math.min(Math.max(page, 1), totalPages);
    const tbody = document.getElementById('memberAnalyticsBody');

    memberAnalyticsCurrentPage = safePage;
    updateMemberAnalyticsPagination(totalMembers, safePage);

    if (totalMembers === 0) {
      renderMemberAnalyticsRows([]);
      return;
    }

    tbody.innerHTML = `<tr><td colspan="${MEMBER_ANALYTICS_COLUMN_COUNT}" class="text-center py-4 text-gray-400">Loading analytics...</td></tr>`;

    const startIndex = (safePage - 1) * MEMBER_ANALYTICS_PAGE_SIZE;
    const pageMembers = members.slice(startIndex, startIndex + MEMBER_ANALYTICS_PAGE_SIZE);

    try {
      const membersWithAnalytics = await Promise.all(pageMembers.map(async member => {
        const analyticsCacheKey = getMemberAnalyticsCacheKey(activeDashboardGroup.id, member.id);
        const summaryCacheKey = getMemberSummaryCacheKey(member.id);
        let analytics = memberAnalyticsCache.get(analyticsCacheKey);
        let summary = memberSummaryCache.get(summaryCacheKey);

        if (!analytics || !summary) {
          const requests = [
            analytics ? Promise.resolve(analytics) : fetchMemberAnalytics(member.id, activeDashboardGroup.id),
            summary ? Promise.resolve(summary) : fetchMemberSummary(member.id)
          ];
          const [resolvedAnalytics, resolvedSummary] = await Promise.all(requests);
          analytics = resolvedAnalytics;
          summary = resolvedSummary;
          memberAnalyticsCache.set(analyticsCacheKey, analytics);
          memberSummaryCache.set(summaryCacheKey, summary);
        }

        return { member, analytics, summary };
      }));

      renderMemberAnalyticsRows(membersWithAnalytics);
      updateMemberAnalyticsPagination(totalMembers, safePage);
    } catch (error) {
      console.error('Failed to load member analytics page:', error);
      tbody.innerHTML = `<tr><td colspan="${MEMBER_ANALYTICS_COLUMN_COUNT}" class="text-center py-4 text-red-400">Unable to load analytics data</td></tr>`;
    }
  }

  // Populate dashboard with group data
  async function populateDashboard(group) {
    const memberCount = (group.members || []).length;
    const tbody = document.getElementById('memberAnalyticsBody');
    
    // Update header
    document.getElementById('dashboardGroupName').textContent = group.name;
    document.getElementById('dashboardGroupMeta').textContent = 
      `Period ${group.period || 'N/A'} · ${group.course || 'N/A'} · ${memberCount} member${memberCount !== 1 ? 's' : ''}`;
    
    // Set global group ID for shared files and chat functionality
    window.currentDashboardGroupId = group.id;
    activeDashboardGroup = group;
    memberAnalyticsCurrentPage = 1;

    // Update stats
    document.getElementById('statTotalMembers').textContent = memberCount;
    updateMemberAnalyticsPagination(memberCount, memberAnalyticsCurrentPage);

    // Update member analytics table if we have real members
    if (group.members && group.members.length > 0) {
      tbody.innerHTML = `<tr><td colspan="${MEMBER_ANALYTICS_COLUMN_COUNT}" class="text-center py-4 text-gray-400">Loading analytics...</td></tr>`;
      
      try {
        await loadDashboardSummaryStats(group);
        await loadMemberAnalyticsPage(1);
      } catch (error) {
        console.error('Failed to load member analytics:', error);
        // Show error state
        tbody.innerHTML = `<tr><td colspan="${MEMBER_ANALYTICS_COLUMN_COUNT}" class="text-center py-4 text-red-400">Unable to load analytics data</td></tr>`;
      }
    } else {
      // No members in group - show empty state and reset stats
      tbody.innerHTML = `<tr><td colspan="${MEMBER_ANALYTICS_COLUMN_COUNT}" class="py-8 text-center text-gray-400">No members in this group</td></tr>`;
      document.getElementById('statTotalMessages').textContent = 0;
      document.getElementById('statTotalFiles').textContent = 0;
    }

    // Store group data for chat functionality
    window.currentGroupData = group;
    
    // Fetch and display shared files for this group
    if (typeof window.fetchDashboardSharedFiles === 'function') {
      await window.fetchDashboardSharedFiles();
    }
  }

  // Helper to get initials from name
  function getInitials(name) {
    if (!name) return '??';
    return name.split(' ')
      .map(word => word[0])
      .join('')
      .toUpperCase()
      .slice(0, 2);
  }

  // Helper to get a consistent color based on ID
  function getRandomColor(id) {
    const colors = [
      'bg-indigo-600', 'bg-purple-600', 'bg-orange-600', 
      'bg-teal-600', 'bg-pink-600', 'bg-blue-600', 
      'bg-green-600', 'bg-red-600', 'bg-yellow-600'
    ];
    return colors[id % colors.length];
  }

  window.previousMemberAnalyticsPage = function () {
    loadMemberAnalyticsPage(memberAnalyticsCurrentPage - 1);
  };

  window.nextMemberAnalyticsPage = function () {
    loadMemberAnalyticsPage(memberAnalyticsCurrentPage + 1);
  };

  // Initialize on page load
  document.addEventListener('DOMContentLoaded', loadGroupDashboard);
</script>
